x-defaults: &apiServiceDefaults
  init: true
  tty: true
  command: npm run server
  env_file:
    - .env
  networks:
    - mr-bio-server

networks:
  mr-bio-server:

services:
  redis:
    container_name: mr-bio-redis
    image: redis:latest
    ports:
      - 6379:6379
    networks:
      - mr-bio-server
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./redis-data:/data
    command: sh -c "redis-server --requirepass $REDIS_PASSWORD"

  kafka:
    image: bitnami/kafka
    container_name: mr-bio-kafka-server
    user: '0:0'
    ports:
      - 9092:9092
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://kafka:9092,CONTROLLER://localhost:2181
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./kafka-data:/bitnami/kafka
    networks:
      - mr-bio-server

  gateway:
    <<: *apiServiceDefaults
    container_name: mr-bio-gateway-server
    build:
      args:
        APP: gateway
        START_COMMAND: server
      dockerfile: ./Dockerfile.development
    ports:
      - '3000:3000'
      - '9000:9000'
      - '9876:9876'
    volumes:
      - ./apps/gateway:/app/apps/gateway
      - ./packages/core:/app/packages/core
      - /app/apps/gateway/node_modules

  user-auth:
    <<: *apiServiceDefaults
    container_name: mr-bio-user-auth-server
    ports:
      - '3001:3001'
      - '9001:9001'
    build:
      args:
        APP: user-auth
        START_COMMAND: server
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/user-auth:/app/apps/user-auth
      - ./packages/core:/app/packages/core
      - /app/apps/user-auth/node_modules

  communication:
    <<: *apiServiceDefaults
    container_name: mr-bio-communication-server
    ports:
      - '3002:3002'
      - '9002:9002'
    build:
      args:
        APP: communication
        START_COMMAND: server
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/communication:/app/apps/communication
      - ./packages/core:/app/packages/core
      - /app/apps/communication/node_modules

  activity-log:
    <<: *apiServiceDefaults
    container_name: mr-bio-activity-log-server
    ports:
      - '3003:3003'
      - '9003:9003'
    build:
      args:
        APP: activity-log
        START_COMMAND: server
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/activity-log:/app/apps/activity-log
      - ./packages/core:/app/packages/core
      - /app/apps/activity-log/node_modules

  product:
    <<: *apiServiceDefaults
    container_name: mr-bio-product-server
    ports:
      - '3004:3004'
      - '9004:9004'
    build:
      args:
        APP: product
        START_COMMAND: server
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/product:/app/apps/product
      - ./packages/core:/app/packages/core
      - /app/apps/product/node_modules
