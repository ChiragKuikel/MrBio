name: Build, Lint and Test
run-name: Lint, build and test PR from ${{ github.head_ref || github.ref_name }} to ${{ github.event.pull_request.base.ref }} by @${{ github.actor }}

on:
  pull_request:
    branches: [dev, qa, uat, prod]
    paths:
      - 'apps/**'
      - 'apps/**/*'
      - 'packages/**'
      - 'packages/**/*'

jobs:
  build-turbo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
