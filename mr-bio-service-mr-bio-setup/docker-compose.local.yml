x-defaults: &apiServiceDefaults
  init: true
  tty: true
  command: npm run local
  env_file:
    - .env.local
  networks:
    - mr-bio-local

networks:
  mr-bio-local:

services:
  kafka:
    image: bitnami/kafka
    container_name: mr-bio-kafka-local
    ports:
      - 9092:9092
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://kafka:9092,CONTROLLER://localhost:2181
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./kafka-data:/bitnami/kafka
    networks:
      - mr-bio-local

  mongodb:
    image: mongo:latest
    container_name: mr-bio-mongodb-local
    restart: always
    extra_hosts:
      - 'localhost:0.0.0.0'
    ports:
      -  ${MONGO_DB_PORT}:${MONGO_DB_PORT}
    networks:
      - mr-bio-local
    env_file:
      - .env.local
      - .env
    environment:
          - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
          - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
          - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
          - MONGO_INITDB_USER=${MONGO_USERNAME}
          - MONGO_INITDB_PWD=${MONGO_PASSWORD}
    volumes:
      - ./mongodb-data:/data/db
      - ./mongodb_replica/initiate.sh:/script/initiate.sh
    command: sh /script/initiate.sh -u $MONGO_USERNAME -p $MONGO_PASSWORD

  gateway:
    <<: *apiServiceDefaults
    container_name: mr-bio-gateway-local
    build:
      args:
        APP: gateway
        START_COMMAND: local
      dockerfile: ./Dockerfile.development
    ports:
      - '3000:3000'
      - '9000:9000'
      - '9876:9876'
    env_file:
      - .env.local
      - .env
    environment:
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET}

  user-auth:
    <<: *apiServiceDefaults
    container_name: mr-bio-user-auth-local
    ports:
      - '3001:3001'
      - '9001:9001'
    build:
      args:
        APP: user-auth
        START_COMMAND: local
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/user-auth:/app/apps/user-auth
      - ./packages/core:/app/packages/core
      - /app/apps/user-auth/node_modules
    environment:
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET}

  communication:
    <<: *apiServiceDefaults
    container_name: mr-bio-communication-local
    ports:
      - '3002:3002'
      - '9002:9002'
    build:
      args:
        APP: communication
        START_COMMAND: local
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/communication:/app/apps/communication
      - ./packages/core:/app/packages/core
      - /app/apps/communication/node_modules

  activity-log:
    <<: *apiServiceDefaults
    container_name: mr-bio-activity-log-local
    ports:
      - '3003:3003'
      - '9003:9003'
    build:
      args:
        APP: activity-log
        START_COMMAND: local
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/activity-log:/app/apps/activity-log
      - ./packages/core:/app/packages/core
      - /app/apps/activity-log/node_modules

  product:
    <<: *apiServiceDefaults
    container_name: mr-bio-product-local
    ports:
      - '3004:3004'
      - '9004:9004'
    build:
      args:
        APP: product
        START_COMMAND: local
      context: .
      dockerfile: ./Dockerfile.development
    volumes:
      - ./apps/product:/app/apps/product
      - ./packages/core:/app/packages/core
      - /app/apps/product/node_modules
